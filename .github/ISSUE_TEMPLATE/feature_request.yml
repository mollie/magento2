name: Feature request
description: Suggest an idea or improvement for the Mollie plugin
labels: ["feature request"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: suggested-implementation
    attributes:
      label: Suggested implementation
      description: If you have ideas on how this could work, describe them here

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or examples
