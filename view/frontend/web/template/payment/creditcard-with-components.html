<div class="payment-method" data-bind="css: getClassNames(), afterRender: function () { rendered(true) },">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label data-bind="attr: {'for': getCode()}" class="label">
            <!-- ko if: getMethodImage() -->
            <img data-bind="attr: {src: getMethodImage()}" class="mollie-payment-icon"/>
            <!--/ko-->
            <span data-bind="text: getTitle()"></span>
        </label>

    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->

        <!-- ko if: isSavedCardsEnabled() && getSavedMandates().length > 0 -->
        <div class="mollie-saved-cards mollie-saved-cards-list">
            <p class="mollie-saved-cards__heading" data-bind="i18n: 'Use a saved card'"></p>
            <!-- ko foreach: getSavedMandates() -->
            <div class="field choice">
                <input type="radio"
                       class="radio"
                       data-bind="
                           attr: {id: 'mollie-mandate-' + mandate_id, value: mandate_id},
                           checked: $parent.selectedMandateId"/>
                <label data-bind="attr: {for: 'mollie-mandate-' + mandate_id}" class="label">
                    <!-- ko if: $parent.getCardLogoUrl($data) -->
                    <img data-bind="attr: {src: $parent.getCardLogoUrl($data), alt: card_label}" class="mollie-card-logo" width="38" height="24"/>
                    <!--/ko-->
                    <span data-bind="text: card_label + ' •••• ' + card_number_last4"></span>
                    <!-- ko if: card_expiry_date -->
                    <span data-bind="text: ' – ' + $t('Expires %1').replace('%1', card_expiry_date)"></span>
                    <!--/ko-->
                </label>
            </div>
            <!--/ko-->
            <div class="field choice">
                <input type="radio"
                       id="mollie-new-card"
                       class="radio"
                       value=""
                       data-bind="checked: selectedMandateId"/>
                <label for="mollie-new-card" class="label">
                    <span data-bind="i18n: 'Use a new card'"></span>
                </label>
            </div>
        </div>
        <!--/ko-->

        <!-- ko if: !isSavedCardsEnabled() || !selectedMandateId() -->
        <div class="card-container">
            <label for="card-holder" data-bind="i18n: 'Name on card'"></label>
            <div id="card-holder"></div>
            <div id="card-holder-error" class="component-error"></div>

            <label for="card-number" data-bind="i18n: 'Card Number'"></label>
            <div id="card-number"></div>
            <div id="card-number-error" class="component-error"></div>

            <label for="expiry-date" data-bind="i18n: 'Expiry Date'"></label>
            <div id="expiry-date"></div>
            <div id="expiry-date-error" class="component-error"></div>

            <label for="verification-code" data-bind="i18n: 'CVC/CVV'"></label>
            <div id="verification-code"></div>
            <div id="verification-code-error" class="component-error"></div>
        </div>

        <!-- ko if: isSavedCardsEnabled() && getConsentText() -->
        <div class="mollie-save-card">
            <div class="field choice">
                <input type="checkbox"
                       id="mollie-save-card"
                       class="checkbox"
                       data-bind="checked: saveCard"/>
                <label for="mollie-save-card" class="label">
                    <span data-bind="i18n: 'Save your card for faster checkout'"></span>
                </label>
            </div>
        </div>
        <!-- ko if: saveCard() -->
        <div class="mollie-save-card-consent">
            <p class="mollie-save-card-consent__text" data-bind="html: getConsentText()"></p>
        </div>
        <!--/ko-->
        <!--/ko-->
        <!--/ko-->

        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                        click: placeOrder,
                        attr: {title: $t('Place Order')},
                        css: {disabled: !isPlaceOrderActionAllowed()},
                        enable: (getCode() == isChecked())"
                        disabled>
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
